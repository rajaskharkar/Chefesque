<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="330" viewBox="0 0 1040 330" role="img" aria-labelledby="title desc">
  <title id="title">Chefesque classic outline logo launcher mask preview</title>
  <desc id="desc">Vector-only preview of the simplified Deep Forest classic saucepan logo clipped by circle, rounded-square, squircle, and teardrop launcher masks.</desc>
  <defs>
    <g id="saucepan" fill="none" stroke="#244437" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"><path d="M148 260H364V318C364 338 346 350 324 350H188C166 350 148 338 148 318V260"/><path d="M204 232C226 212 286 212 308 232"/><path d="M242 196H270"/><path d="M364 284H406C418 284 426 292 426 302C426 312 418 320 406 320H364"/></g>
    <g id="logo"><rect width="512" height="512" fill="#F6F0E4"/><use href="#saucepan"/></g>
    <clipPath id="circle"><circle cx="256" cy="256" r="256"/></clipPath>
    <clipPath id="round"><rect width="512" height="512" rx="112"/></clipPath>
    <clipPath id="squircle"><path d="M256 0C78 0 0 78 0 256s78 256 256 256 256-78 256-256S434 0 256 0z"/></clipPath>
    <clipPath id="teardrop"><path d="M256 0c141 0 256 115 256 256 0 120-84 224-201 250-25 6-50-8-60-31C221 405 107 405 51 350 18 317 0 272 0 224 0 100 100 0 256 0z"/></clipPath>
  </defs>
  <rect width="1040" height="330" fill="#FFFDF8"/>
  <text x="24" y="34" font-family="sans-serif" font-size="18" fill="#2E342F">Chefesque classic outline adaptive launcher mask checks</text>
  <g transform="translate(24 60) scale(.43)" clip-path="url(#circle)"><use href="#logo"/></g><circle cx="134" cy="170" r="110" fill="none" stroke="#77736B" stroke-width="2"/><text x="88" y="305" font-family="sans-serif" font-size="15" fill="#2E342F">Circle</text>
  <g transform="translate(278 60) scale(.43)" clip-path="url(#round)"><use href="#logo"/></g><rect x="278" y="60" width="220" height="220" rx="48" fill="none" stroke="#77736B" stroke-width="2"/><text x="332" y="305" font-family="sans-serif" font-size="15" fill="#2E342F">Rounded square</text>
  <g transform="translate(532 60) scale(.43)" clip-path="url(#squircle)"><use href="#logo"/></g><path transform="translate(532 60) scale(.43)" d="M256 0C78 0 0 78 0 256s78 256 256 256 256-78 256-256S434 0 256 0z" fill="none" stroke="#77736B" stroke-width="5"/><text x="610" y="305" font-family="sans-serif" font-size="15" fill="#2E342F">Squircle</text>
  <g transform="translate(786 60) scale(.43)" clip-path="url(#teardrop)"><use href="#logo"/></g><path transform="translate(786 60) scale(.43)" d="M256 0c141 0 256 115 256 256 0 120-84 224-201 250-25 6-50-8-60-31C221 405 107 405 51 350 18 317 0 272 0 224 0 100 100 0 256 0z" fill="none" stroke="#77736B" stroke-width="5"/><text x="858" y="305" font-family="sans-serif" font-size="15" fill="#2E342F">Teardrop</text>
</svg>
