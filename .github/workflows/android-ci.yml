name: Android CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-and-test:
    name: Compile and unit test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: android

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Print Java and Gradle versions
        run: |
          java -version
          ./gradlew --version

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin --stacktrace

      - name: Run debug unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace --info

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            android/app/build/test-results/testDebugUnitTest
            android/app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
